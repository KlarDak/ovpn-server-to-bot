client
dev tun
proto tcp
remote 192.168.1.75 443   # <-- заменить на IP сервера или домен
resolv-retry infinite
nobind
persist-key
persist-tun

connect-retry 3
connect-retry-max 5

remote-cert-tls server
cipher AES-256-CBC
auth SHA256
key-direction 1
verb 3

# Вставляем сертификаты и ключи inline
<ca>
{CA_CERT}
</ca>

<cert>
{CLIENT_CERT}
</cert>

<key>
{CLIENT_KEY}
</key>

<tls-crypt>
{TLS_KEY}
</tls-crypt>
